# Marketing Suite - Nginx Configuration Example
# Copy this to /etc/nginx/sites-available/marketing and adjust paths.

server {
    listen 80;
    server_name marketing.example.com;
    root /var/www/marketing/public;
    index index.php;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block access to sensitive paths
    location ~ /\.(env|git|htaccess) { deny all; }
    location ^~ /data/ { deny all; }
    location ^~ /src/ { deny all; }

    # Serve uploaded media
    location ^~ /uploads/ {
        alias /var/www/marketing/data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Route everything else to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }
}
